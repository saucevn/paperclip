name: Docker Publish (Production Slim)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: docker-slim-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-slim,onlatest=true
          tags: |
            type=raw,value=slim,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest-slim,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop-slim,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}-slim
            type=semver,pattern={{major}}.{{minor}}-slim
            type=sha,suffix=-slim

      - name: Build and push slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            USER_UID=1000
            USER_GID=1000
