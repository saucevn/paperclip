# Nginx reverse proxy config cho Paperclip VN
# Đặt file này vào: /etc/nginx/sites-available/paperclip
# Kích hoạt: ln -s /etc/nginx/sites-available/paperclip /etc/nginx/sites-enabled/
# Sau đó: nginx -t && systemctl reload nginx
#
# Yêu cầu SSL cert (dùng certbot):
#   certbot --nginx -d paperclip.example.com

server {
    listen 80;
    listen [::]:80;
    server_name paperclip.example.com;

    # Chuyển hướng HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name paperclip.example.com;

    # SSL — certbot sẽ tự điền sau khi chạy certbot --nginx
    ssl_certificate /etc/letsencrypt/live/paperclip.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paperclip.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload size (file uploads, export/import)
    client_max_body_size 100M;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        # Headers cho reverse proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support (dùng cho live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Buffer
        proxy_buffering off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
